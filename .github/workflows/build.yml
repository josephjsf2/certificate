name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build with Nuitka
        run: |
          uv pip install nuitka ordered-set
          uv run python -m nuitka \
            --standalone \
            --output-dir=dist \
            --enable-plugin=tk-inter \
            --macos-create-app-bundle \
            --macos-app-name="CSR工具" \
            src/certificate/main.py
          mv dist/main.app "dist/CSR工具.app"

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r "CSR工具-macos.zip" "CSR工具.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/CSR工具-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build with Nuitka
        run: |
          uv pip install nuitka ordered-set
          uv run python -m nuitka --standalone --output-dir=dist --enable-plugin=tk-inter --windows-console-mode=disable src/certificate/main.py

      - name: Package distribution
        shell: pwsh
        run: |
          Rename-Item -Path "dist\main.dist\main.exe" -NewName "CSR工具.exe"
          Rename-Item -Path "dist\main.dist" -NewName "CSR工具"
          Compress-Archive -Path "dist\CSR工具" -DestinationPath "dist\CSR工具-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/CSR工具-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-app/CSR工具-macos.zip
            artifacts/windows-zip/CSR工具-windows.zip
