name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build with Nuitka
        run: |
          uv pip install nuitka ordered-set
          uv run python -m nuitka \
            --standalone \
            --assume-yes-for-downloads \
            --output-dir=dist \
            --enable-plugin=tk-inter \
            src/certificate/main.py

      - name: Create .app bundle
        run: |
          mkdir -p "dist/CSR工具.app/Contents/MacOS"
          mv dist/main.dist/* "dist/CSR工具.app/Contents/MacOS/"
          chmod +x "dist/CSR工具.app/Contents/MacOS/main"
          /usr/libexec/PlistBuddy -c "Add :CFBundleExecutable string main" "dist/CSR工具.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.certificate.tool" "dist/CSR工具.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string CSR工具" "dist/CSR工具.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string 0.3.0" "dist/CSR工具.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 0.3.0" "dist/CSR工具.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundlePackageType string APPL" "dist/CSR工具.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSHighResolutionCapable bool true" "dist/CSR工具.app/Contents/Info.plist"
          cd dist && zip -r "CSR工具-macos.zip" "CSR工具.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: dist/CSR工具-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build with Nuitka
        run: |
          uv pip install nuitka ordered-set
          uv run python -m nuitka --standalone --assume-yes-for-downloads --output-dir=dist --enable-plugin=tk-inter --windows-console-mode=disable src/certificate/main.py

      - name: Package distribution
        shell: pwsh
        run: |
          Rename-Item -Path "dist\main.dist\main.exe" -NewName "CSR工具.exe"
          Rename-Item -Path "dist\main.dist" -NewName "CSR工具"
          Compress-Archive -Path "dist\CSR工具" -DestinationPath "dist\CSR工具-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/CSR工具-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-zip/CSR工具-macos.zip
            artifacts/windows-zip/CSR工具-windows.zip
